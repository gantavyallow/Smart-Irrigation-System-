# ── Server ─────────────────────────────────────────────────────────────────────
# Accessible from phone on same WiFi: http://<your-PC-IP>:8080
server.address=0.0.0.0
server.port=8080

# ── Thymeleaf ──────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── MySQL (raw JDBC — no Hibernate) ───────────────────────────────────────────
# Set your actual MySQL root password below:
db.url=jdbc:mysql://localhost:3306/smart_garden_db
db.username=root
db.password=Riddhima@20

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.irrigation=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{20} - %msg%n
